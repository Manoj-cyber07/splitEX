<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>splitEX - Web3 Expense Sharing</title>
    <meta name="theme-color" content="#03050a">

    <script src="https://cdn.tailwindcss.com"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk@13.3.0/dist/stellar-sdk.min.js"></script>
    
    <script src="https://unpkg.com/@albedo-link/intent/lib/albedo.intent.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-freighter-api/1.5.1/index.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        /* Hide scrollbar for clean app look but keep functionality */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -ms-overflow-style: none; scrollbar-width: none; background-color: #03050a; }
    </style>
</head>
<body class="bg-[#03050a] text-white antialiased overflow-x-hidden">
    
    <div id="root"></div>

    <script>
      // Transpile app.js in the browser using Babel's CLASSIC JSX runtime.
      // The default (automatic) runtime emits `import { jsx } from "react/jsx-runtime"`,
      // which throws "Cannot use import statement outside a module" in a classic script.
      (function () {
        function boot() {
          fetch('app.js')
            .then(function (r) { return r.text(); })
            .then(function (src) {
              var out = Babel.transform(src, {
                presets: [['react', { runtime: 'classic' }]],
                filename: 'app.js'
              }).code;
              var s = document.createElement('script');
              s.textContent = out;
              document.body.appendChild(s);
            })
            .catch(function (e) { console.error('Failed to load app.js:', e); });
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', boot);
        } else {
          boot();
        }
      })();
    </script>

</body>
</html>
